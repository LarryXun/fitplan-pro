<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - FitPlan Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      color: #111827;
      margin-bottom: 12px;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .tips {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: left;
    }
    .tips h3 {
      font-size: 14px;
      color: #374151;
      margin-bottom: 12px;
    }
    .tips ul {
      list-style: none;
      padding: 0;
    }
    .tips li {
      padding: 8px 0;
      color: #6b7280;
      font-size: 14px;
    }
    .tips li:before {
      content: "✓ ";
      color: #10b981;
      font-weight: bold;
    }
    .reload-btn {
      margin-top: 24px;
      padding: 12px 32px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .reload-btn:hover {
      background: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>当前处于离线状态</h1>
    <p>FitPlan Pro 的部分功能仍可使用。您的数据已保存在本地。</p>
    
    <div class="tips">
      <h3>离线时可用功能:</h3>
      <ul>
        <li>查看训练计划</li>
        <li>记录饮食数据</li>
        <li>查看器械信息</li>
        <li>追踪身体数据</li>
        <li>执行训练</li>
      </ul>
    </div>
    
    <button class="reload-btn" onclick="window.location.reload()">
      重新连接
    </button>
  </div>
</body>
</html>
